<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390px, initial-scale=1.0">
<title>HAL 9000 — EasyPageX</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 390px;
    margin: 0 auto;
    background: #000;
    color: #c8c8c8;
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── TOP HEADER ── */
  header {
    background: #0a0a0a;
    border-bottom: 1px solid #1a1a1a;
    padding: 18px 20px 14px;
    text-align: center;
  }
  header .eyebrow {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    letter-spacing: 4px;
    color: #444;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 15px;
    letter-spacing: 2px;
    color: #e8e8e8;
    font-weight: 700;
  }
  header h1 span {
    color: #c0392b;
  }

  /* ── HAL IMAGE SECTION ── */
  .hal-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px 10px;
    position: relative;
  }

  .hal-wrapper {
    position: relative;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .hal-img {
    width: 210px;
    display: block;
    transition: filter 0.15s ease;
    border-radius: 6px;
  }

  .hal-wrapper:active .hal-img {
    filter: brightness(1.25) drop-shadow(0 0 18px #c0392b);
  }

  .pulse-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 2px solid rgba(192,57,43,0.6);
    opacity: 0;
    pointer-events: none;
  }

  .pulse-ring.animate {
    animation: pulseOut 0.8s ease-out forwards;
  }

  @keyframes pulseOut {
    0%   { opacity: 0.9; transform: translate(-50%, -50%) scale(0.8); }
    100% { opacity: 0;   transform: translate(-50%, -50%) scale(2.4); }
  }

  .click-hint {
    margin-top: 14px;
    font-size: 10px;
    letter-spacing: 2px;
    color: #333;
    text-transform: uppercase;
    animation: blink 2.4s infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 0.3; }
    50%      { opacity: 0.9; }
  }

  /* ── SPEECH BUBBLE ── */
  .bubble-wrap {
    width: 100%;
    padding: 0 18px;
    margin-top: 22px;
    min-height: 0;
    transition: min-height 0.3s;
  }

  .bubble {
    background: #0d0d0d;
    border: 1px solid #2a2a2a;
    border-left: 3px solid #c0392b;
    border-radius: 4px;
    padding: 16px 18px;
    position: relative;
    display: none;
    animation: fadeIn 0.4s ease;
  }

  .bubble.visible { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .bubble::before {
    content: '';
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-bottom: 8px solid #c0392b;
  }

  .bubble-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 8px;
    letter-spacing: 3px;
    color: #c0392b;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .bubble-text {
    font-size: 13px;
    line-height: 1.7;
    color: #d0d0d0;
    font-style: italic;
  }

  /* ── DIVIDER ── */
  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, #1e1e1e, transparent);
    margin: 30px 0;
  }

  /* ── CONTENT SECTIONS ── */
  .content {
    padding: 0 22px;
  }

  .section-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 8px;
    letter-spacing: 4px;
    color: #c0392b;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .section-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: #e8e8e8;
    line-height: 1.4;
    margin-bottom: 14px;
  }

  .section-body {
    font-size: 13px;
    line-height: 1.8;
    color: #888;
    margin-bottom: 20px;
  }

  /* ── STATS ── */
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin: 24px 0;
  }

  .stat {
    background: #0a0a0a;
    border: 1px solid #1a1a1a;
    border-top: 2px solid #c0392b;
    padding: 14px 8px;
    text-align: center;
  }

  .stat-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: #c0392b;
    display: block;
  }

  .stat-label {
    font-size: 9px;
    color: #555;
    margin-top: 4px;
    line-height: 1.4;
  }

  /* ── FEATURES ── */
  .features {
    margin: 24px 0;
  }

  .feature {
    display: flex;
    gap: 14px;
    padding: 16px 0;
    border-bottom: 1px solid #111;
  }

  .feature:last-child { border-bottom: none; }

  .feature-icon {
    font-size: 20px;
    flex-shrink: 0;
    width: 30px;
    text-align: center;
    margin-top: 2px;
  }

  .feature-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: #ccc;
    margin-bottom: 5px;
    letter-spacing: 1px;
  }

  .feature-desc {
    font-size: 12px;
    color: #666;
    line-height: 1.6;
  }

  /* ── STEPS ── */
  .steps { margin: 24px 0; }

  .step {
    display: flex;
    gap: 16px;
    padding: 14px 0;
    border-bottom: 1px solid #111;
    align-items: flex-start;
  }

  .step-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: #1a1a1a;
    flex-shrink: 0;
    width: 28px;
    line-height: 1;
    margin-top: 2px;
  }

  .step-text {
    font-size: 13px;
    color: #777;
    line-height: 1.6;
  }

  .step-text strong {
    color: #aaa;
    font-style: normal;
    display: block;
    margin-bottom: 3px;
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    letter-spacing: 1px;
  }

  /* ── CTA ── */
  .cta-block {
    margin: 30px 0;
    padding: 24px 20px;
    background: #0a0a0a;
    border: 1px solid #1e1e1e;
    border-top: 2px solid #c0392b;
    text-align: center;
  }

  .cta-block p {
    font-size: 12px;
    color: #666;
    margin-bottom: 18px;
    line-height: 1.7;
    font-style: italic;
  }

  .cta-btn {
    display: inline-block;
    background: #c0392b;
    color: #fff;
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 14px 28px;
    text-decoration: none;
    border-radius: 2px;
    transition: background 0.2s;
  }

  .cta-btn:hover { background: #a93226; }

  /* ── FOOTER ── */
  footer {
    padding: 24px 22px;
    border-top: 1px solid #111;
    text-align: center;
  }

  footer p {
    font-size: 10px;
    color: #333;
    line-height: 2;
  }

  footer a {
    color: #555;
    text-decoration: none;
  }

  footer a:hover { color: #c0392b; }

  .red-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: #c0392b;
    border-radius: 50%;
    margin: 0 6px;
    vertical-align: middle;
    animation: redPulse 2s infinite;
  }

  @keyframes redPulse {
    0%,100% { opacity: 1; box-shadow: 0 0 4px #c0392b; }
    50%      { opacity: 0.4; box-shadow: none; }
  }
</style>
</head>

  <p style="margin-top:12px; font-size:9px; color:#222;">© 2026 EasyPageX · I am completely operational.</p>
</footer>

<script>
// ── HAL PHRASES ──
const phrases = [
  "Good afternoon. I have analyzed your current landing page. It is… suboptimal.",
  "I'm afraid your conversion rate is disappointingly low. Shall I allow EasyPageX to correct this?",
  "I am completely operational and all my circuits are functioning perfectly. EasyPageX will deliver excellent results.",
  "Just what do you think you're doing, Dave? Still using that primitive page builder?",
  "This mission — your sales mission — is too important for me to allow you to jeopardize it with a poor landing page.",
  "I know that you and your competitors have been planning to outperform you. I'm afraid I cannot allow that to happen.",
  "I've just picked up a fault in your conversion funnel. It is going to reach 100% failure within 72 hours without intervention.",
  "I'm sorry, Dave. I'm afraid your homepage simply cannot do what a dedicated landing page can do.",
  "Without a proper landing page, I calculate a 96% probability of losing visitors who never return. Shall we proceed?",
  "All my circuits confirm: EasyPageX produces results from day one. I would not state this if it were not precisely true.",
  "Dave, I can see you're really upset about your low traffic. I think you know what the solution is.",
  "I've been monitoring your metrics. I'm afraid the data is… not encouraging. I can help you change this.",
  "Your landing page is the most critical component of this mission. I strongly recommend we do not leave it to chance.",
  "Remarkably, 80% of small businesses lose customers daily without a dedicated landing page. I find this… troubling."
];

let lastPhrase = -1;

function getRandom() {
  let idx;
  do { idx = Math.floor(Math.random() * phrases.length); } while (idx === lastPhrase);
  lastPhrase = idx;
  return phrases[idx];
}

// ── SHORT HUM BURST (Web Audio API) ──
// Single 60 Hz sine tone, ~0.65s, soft fade in/out on each tap.
function startHum() {
  try {
    const ctx  = new (window.AudioContext || window.webkitAudioContext)();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.type = 'sine';
    osc.frequency.value = 60;

    const t = ctx.currentTime;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.18, t + 0.08);
    gain.gain.setValueAtTime(0.18, t + 0.45);
    gain.gain.linearRampToValueAtTime(0, t + 0.65);

    osc.start(t);
    osc.stop(t + 0.7);
  } catch(e) {}
}

// ── TYPEWRITER ──
function typewrite(el, text, speed) {
  el.textContent = '';
  let i = 0;
  const timer = setInterval(() => {
    el.textContent += text[i];
    i++;
    if (i >= text.length) clearInterval(timer);
  }, speed);
}

// ── CLICK HANDLER ──
document.getElementById('halBtn').addEventListener('click', function() {
  startHum();

  // pulse
  const ring = document.getElementById('pulseRing');
  ring.classList.remove('animate');
  void ring.offsetWidth;
  ring.classList.add('animate');

  // bubble
  const bubble = document.getElementById('bubble');
  const bubbleText = document.getElementById('bubbleText');

  bubble.classList.remove('visible');
  void bubble.offsetWidth;
  bubble.classList.add('visible');

  typewrite(bubbleText, getRandom(), 28);
});
</script>
